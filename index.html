            margin: 0;
            background: #020617; /* 预设深色背景，防止白屏刺眼 */

        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar {

        /* Loading 状态样式 */
        #root:empty::before {
            content: 'SYSTEM INITIALIZING...';
            display: flex;
            height: 100vh;
            width: 100vw;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            letter-spacing: 0.5em;
            color: #10b981; /* Emerald-500 */
            font-weight: 900;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
